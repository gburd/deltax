services:
  # Run tests: docker compose run --rm test
  test:
    build:
      context: .
      target: test
      args:
        PG_MAJOR: "17"
    command: cargo pgrx test pg17

  # Interactive psql with extension: docker compose up dev
  dev:
    build:
      context: .
      target: runtime
      args:
        PG_MAJOR: "17"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pg_cocoon_dev
    ports:
      - "5499:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
